name: Microservices CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: ap-south-1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user:
              - 'services/user/**'
            order:
              - 'services/order/**'
            payment:
              - 'services/payment/**'
            notification:
              - 'services/notification/**'

  build-test-scan-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: services/${{ matrix.service }}
        run: |
          docker build \
            -t ${{ steps.ecr-login.outputs.registry }}/microservices-cicd-${{ matrix.service }}:${{ github.sha }} \
            -t ${{ steps.ecr-login.outputs.registry }}/microservices-cicd-${{ matrix.service }}:latest \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/microservices-cicd-${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'   # fails the job on critical/high CVEs

      - name: Push image to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/microservices-cicd-${{ matrix.service }}:${{ github.sha }}
          docker push ${{ steps.ecr-login.outputs.registry }}/microservices-cicd-${{ matrix.service }}:latest

  update-manifest:
    needs: [detect-changes, build-test-scan-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image tag in manifest
        run: |
          sed -i "s|image: .*microservices-cicd-${{ matrix.service }}:.*|image: ${{ needs.build-test-scan-push.outputs.registry }}/microservices-cicd-${{ matrix.service }}:${{ github.sha }}|" \
            k8s/${{ matrix.service }}/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/${{ matrix.service }}/deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: deploy ${{ matrix.service }} @ ${{ github.sha }} [skip ci]"
          git push origin main  