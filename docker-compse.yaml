services:
  user:
    build: ./services/user
    ports:
      - "3000:3000"
    environment:
      - PORT=3000

  payment:
    build: ./services/payment
    ports:
      - "3002:3000"
    environment:
      - PORT=3000

  notification:
    build: ./services/notification
    ports:
      - "3003:3000"
    environment:
      - PORT=3000

  order:
    build: ./services/order
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - PAYMENT_SERVICE_URL=http://payment:3000
      - NOTIFICATION_SERVICE_URL=http://notification:3000
    depends_on:
      - payment
      - notification
