apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: microservices
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" \
                -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" \
                -f /schema/schema.sql
          envFrom:
            - secretRef:
                name: rds-credentials
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: DB_PASSWORD
          volumeMounts:
            - name: schema
              mountPath: /schema
      volumes:
        - name: schema
          configMap:
            name: db-schema