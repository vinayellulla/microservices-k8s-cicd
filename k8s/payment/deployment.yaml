apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: microservices
  labels:
    app: payment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
        - name: payment
          image: 666531394927.dkr.ecr.ap-south-1.amazonaws.com/microservices-cicd-payment:fcfe080d5c553ba06a567130031a4b85c6c1839c
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15